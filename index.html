<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    (function() {
      // 取得使用者瀏覽器的語言設定，例如 "zh-TW", "en-US"
      var userLang = navigator.language || navigator.userLanguage; 
      
      // 取得主要語言代碼，例如 "zh", "en"
      var primaryLang = userLang.split('-')[0];

      // --- 請在此處設定您五種語言對應的 App Store 連結 ---
      var urls = {
        // --- 精準匹配 (優先) ---
        // 繁體中文
        // 'zh-TW': 'https://apps.apple.com/tw/app/your-app-name/idXXXXXXXXX', // 台灣
        // 'zh-HK': 'https://apps.apple.com/hk/app/your-app-name/idXXXXXXXXX', // 香港
        'zh-Hant': 'https://apps.apple.com/tw/app/%E8%80%B3%E5%8C%A0/id6749874856', // 備用繁體代碼

        // 簡體中文
        // 'zh-CN': 'https://apps.apple.com/cn/app/your-app-name/idXXXXXXXXX', // 中國大陸
        // 'zh-SG': 'https://apps.apple.com/sg/app/your-app-name/idXXXXXXXXX', // 新加坡
        'zh-Hans': 'https://apps.apple.com/cn/app/your-app-name/idXXXXXXXXX', // 備用簡體代碼

        // --- 主要語言匹配 (備用) ---
        // 英文 (同時也是所有匹配失敗後的預設語言)
        'en': 'https://apps.apple.com/us/app/earmaster/id6749874856',

        // 日文
        'ja': 'https://apps.apple.com/jp/app/%E8%80%B3%E3%83%9E%E3%82%B9%E3%82%BF%E3%83%BC/id6749874856',

        // 韓文
        'ko': 'https://apps.apple.com/kr/app/%EA%B7%80-%EB%A7%88%EC%8A%A4%ED%84%B0/id6749874856',

        // 備用的 'zh' 匹配，預設導向到繁體中文
        'zh': 'https://apps.apple.com/tw/app/%E8%80%B3%E5%8C%A0/id6749874856'
      };
      
      // 邏輯：
      // 1. 優先嘗試完整代碼匹配 (例如 'zh-TW')
      // 2. 如果失敗，則嘗試主要語言代碼匹配 (例如 'ja')
      // 3. 如果全部失敗，則使用預設的英文 ('en') 連結
      var redirectUrl = urls[userLang] || urls[primaryLang] || urls['en'];
      
      // 執行跳轉
      window.location.replace(redirectUrl);

    })();
  </script>
</head>
<body>
  <p>Finding the correct App Store for you...</p>
</body>
</html>
